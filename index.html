<!DOCTYPE html>
<html lang = 'es'>
    <head>
        <meta charset='utf-8'>
        <title>Range</title>
        <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
        <script src="read_range.js"></script>
    </head>

    <body>
        <h1>In this page we'll send a series of numbers from a range bar</h1>
        
        <label for="q1">q1(°):</label>
        <input type="range" id="q1" name="q1" min="0" max="180" value="90">

        <label for="q2">q2(°):</label>
        <input type="range" id="q2" name="q2" min="0" max="180" value="90">

        <label for="q3">q3(°)</label>
        <input type="range" id="q3" name="q3" min="0" max="180" value="90">

    </body>
</html>
